name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: feature
    attributes:
      label: Feature idea
      description: Describe what you want added or changed.
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why would this be useful?
    validations:
      required: false
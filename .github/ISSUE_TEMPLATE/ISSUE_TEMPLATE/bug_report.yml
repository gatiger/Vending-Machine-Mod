name: Bug Report
description: Report a problem with the vending machine mod
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: mod-version
    attributes:
      label: Mod version
      placeholder: "0.1.0-beta"
    validations:
      required: true

  - type: input
    id: minecraft-version
    attributes:
      label: Minecraft version
      placeholder: "1.21.1"
    validations:
      required: true

  - type: input
    id: neoforge-version
    attributes:
      label: NeoForge version
      placeholder: "21.x.x"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Place vending machine
        2. Open admin GUI
        3. Click ...
        4. Bug happens
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or crash report
      description: Paste logs here or attach a crash report.
      render: text